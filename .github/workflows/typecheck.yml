# =============================================================================
# TypeScript Typecheck Workflow
# =============================================================================
# Runs tsc --noEmit on every push to any branch.
# Catches type errors before they reach the build or deployment stage.
# =============================================================================

name: TypeScript

on:
  push:

concurrency:
  group: typecheck-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript check
        run: npm run typecheck

# =============================================================================
# Vercel Deploy Prod Workflow
# =============================================================================
# Fires only when a GitHub Release is published (created from any tag/branch).
# Create a release via: GitHub → Releases → "Draft a new release".
#
# Deploys to Vercel Production environment (kitaradar-prod schema).
#
# Secrets required (repository level):
#   - VERCEL_PROJECT_ID
# Already set at organisation level:
#   - VERCEL_TOKEN
#   - VERCEL_ORG_ID
# =============================================================================

name: Vercel Deploy Prod

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: deploy-prod-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify — Lint, TypeCheck, Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript check
        run: npm run typecheck

      - name: Run tests with coverage
        run: npm run test:coverage

  deploy-production:
    name: Deploy — Production (kitaradar-prod)
    needs: verify
    uses: Wamocon/github_workflow/.github/workflows/deploy.yml@main
    with:
      vercel_env: production
      db_schema: kitaradar-prod
    secrets: inherit

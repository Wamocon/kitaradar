# =============================================================================
# Unittest Workflow
# =============================================================================
# Runs on every push to any branch.
# For PR branches this fires via the push event (NOT pull_request) to avoid
# double execution — the deploy-test workflow handles the PR event separately.
# =============================================================================

name: Unittests

on:
  push:

permissions:
  contents: read

concurrency:
  group: unittest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

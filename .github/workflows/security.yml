# =============================================================================
# Security Audit Workflow
# =============================================================================
# Runs npm audit on every push AND weekly on Mondays at 06:00 UTC.
# Only flags vulnerabilities at "high" severity or above.
# =============================================================================

name: Security Audit

on:
  push:
  schedule:
    - cron: "0 6 * * 1"   # Every Monday at 06:00 UTC

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: npm audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        run: npm audit --audit-level=high
